<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace" role="img" aria-label="On-premises SQL Server replicated to Amazon RDS for SQL Server via Debezium CDC over AWS Direct Connect">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#ffb454"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="1100" height="540" rx="12" fill="#0d1117"/>
  <text x="32" y="44" fill="#ffb454" font-size="19" font-weight="600">On-prem SQL Server &#8594; Amazon RDS for SQL Server</text>
  <text x="32" y="68" fill="#8a93a6" font-size="13">Near-real-time replication with Debezium CDC + the JDBC sink</text>

  <!-- ON-PREM ZONE -->
  <rect x="30" y="150" width="300" height="252" rx="10" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="48" y="178" fill="#94a3b8" font-size="12" letter-spacing="1">ON-PREMISES DATA CENTER</text>
  <!-- source SQL Server cylinder -->
  <g>
    <rect x="108" y="222" width="104" height="72" fill="#1b2330"/>
    <line x1="108" y1="222" x2="108" y2="294" stroke="#6b7689" stroke-width="1.5"/>
    <line x1="212" y1="222" x2="212" y2="294" stroke="#6b7689" stroke-width="1.5"/>
    <ellipse cx="160" cy="294" rx="52" ry="12" fill="#1b2330" stroke="#6b7689" stroke-width="1.5"/>
    <ellipse cx="160" cy="222" rx="52" ry="12" fill="#243043" stroke="#6b7689" stroke-width="1.5"/>
    <text x="160" y="226" text-anchor="middle" fill="#cfd8e3" font-size="11">SQL Server</text>
    <text x="160" y="330" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Source DB</text>
    <text x="160" y="348" text-anchor="middle" fill="#8a93a6" font-size="11">SQL Server &#183; CDC on</text>
  </g>

  <!-- AWS ZONE -->
  <rect x="372" y="92" width="696" height="416" rx="10" fill="#ff9900" fill-opacity="0.04" stroke="#ff9900" stroke-width="1.5"/>
  <text x="392" y="120" fill="#ff9900" font-size="12" letter-spacing="1">AWS CLOUD &#183; VPC</text>

  <!-- Debezium source connector -->
  <rect x="400" y="300" width="158" height="94" rx="8" fill="#161b22" stroke="#ffb454" stroke-width="1.5"/>
  <text x="479" y="334" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Debezium</text>
  <text x="479" y="352" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">SQL Server source</text>
  <text x="479" y="372" text-anchor="middle" fill="#8a93a6" font-size="11">Kafka Connect</text>

  <!-- Amazon MSK -->
  <rect x="612" y="150" width="180" height="104" rx="8" fill="#161b22" stroke="#ff9900" stroke-width="1.5"/>
  <g stroke="#ff9900" stroke-width="2" fill="none">
    <line x1="636" y1="178" x2="768" y2="178"/>
    <line x1="636" y1="190" x2="768" y2="190"/>
    <line x1="636" y1="202" x2="768" y2="202"/>
  </g>
  <text x="702" y="226" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Amazon MSK</text>
  <text x="702" y="244" text-anchor="middle" fill="#8a93a6" font-size="11">Kafka + Schema Registry</text>

  <!-- Debezium JDBC sink -->
  <rect x="612" y="360" width="180" height="104" rx="8" fill="#161b22" stroke="#ffb454" stroke-width="1.5"/>
  <text x="702" y="396" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Debezium JDBC sink</text>
  <text x="702" y="416" text-anchor="middle" fill="#8a93a6" font-size="11">Kafka Connect</text>
  <text x="702" y="438" text-anchor="middle" fill="#ffb454" font-size="11">identity insert ON</text>

  <!-- target RDS cylinder -->
  <g>
    <rect x="888" y="300" width="104" height="72" fill="#2a2012"/>
    <line x1="888" y1="300" x2="888" y2="372" stroke="#ff9900" stroke-width="1.5"/>
    <line x1="992" y1="300" x2="992" y2="372" stroke="#ff9900" stroke-width="1.5"/>
    <ellipse cx="940" cy="372" rx="52" ry="12" fill="#2a2012" stroke="#ff9900" stroke-width="1.5"/>
    <ellipse cx="940" cy="300" rx="52" ry="12" fill="#3a2c16" stroke="#ff9900" stroke-width="1.5"/>
    <text x="940" y="304" text-anchor="middle" fill="#ffd9a0" font-size="11">RDS</text>
    <text x="940" y="408" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Amazon RDS</text>
    <text x="940" y="426" text-anchor="middle" fill="#8a93a6" font-size="11">for SQL Server &#183; target</text>
  </g>

  <!-- edges -->
  <!-- source -> debezium source (across boundary) -->
  <line x1="214" y1="262" x2="398" y2="330" stroke="#ffb454" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="244" y="226" width="190" height="20" rx="4" fill="#0d1117"/>
  <text x="252" y="240" fill="#cfd8e3" font-size="11">AWS Direct Connect / VPN</text>

  <!-- debezium source -> MSK -->
  <line x1="520" y1="300" x2="640" y2="256" stroke="#ffb454" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="520" y="276" width="118" height="18" rx="4" fill="#0d1117"/>
  <text x="527" y="289" fill="#cfd8e3" font-size="10.5">CDC events (Avro)</text>

  <!-- MSK -> sink -->
  <line x1="702" y1="254" x2="702" y2="358" stroke="#ffb454" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="710" y="298" width="86" height="18" rx="4" fill="#0d1117"/>
  <text x="716" y="311" fill="#cfd8e3" font-size="10.5">Kafka topic</text>

  <!-- sink -> RDS -->
  <line x1="792" y1="408" x2="890" y2="350" stroke="#ffb454" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="788" y="430" width="186" height="18" rx="4" fill="#0d1117"/>
  <text x="794" y="443" fill="#cfd8e3" font-size="10.5">upsert + IDENTITY_INSERT</text>
</svg>
